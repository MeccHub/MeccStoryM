<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NarCount Admin (Beta)</title>
  <style>
    :root{--bg:#0b1220;--surface:#111a2e;--surface2:#0f172a;--text:#e5e7eb;--muted:#94a3b8;--accent:#00d4aa;--danger:#ff4d6d;--border:#2a3b52}
body.light{--bg:#f5f8fc;--surface:#ffffff;--surface2:#f3f6fb;--text:#0f172a;--muted:#475569;--accent:#0ea5e9;--danger:#e11d48;--border:#d6deea}
    body{font-family:Inter,system-ui,Arial;background:var(--bg);color:var(--text);margin:0}
    .wrap{max-width:1200px;margin:18px auto;padding:0 14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    input,button,select{padding:9px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text)}
    button{cursor:pointer}
    button.primary{background:#1f3b66;border-color:#33507b;color:#eaf2ff}
    button.danger{background:rgba(255,77,109,.15);border-color:#7a2f3d;color:#ffd7df}
    body.light button.primary{background:#0ea5e9;border-color:#0284c7;color:#ffffff}
    body.light button.danger{background:#e11d48;border-color:#be123c;color:#ffffff}
    body.light .ok{background:rgba(14,165,233,.12);border-color:rgba(14,165,233,.45)}
    body.light input::placeholder{color:#64748b}
    .muted{color:var(--muted);font-size:12px}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid var(--border);padding:8px;text-align:left;font-size:12px;vertical-align:top}
    th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
    .pill{padding:2px 7px;border-radius:999px;font-size:11px;border:1px solid var(--border)}
    .ok{background:rgba(0,212,170,.12);border-color:rgba(0,212,170,.45)}
    .center-pop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:99999;background:rgba(0,0,0,.4)}
    .center-pop .box{min-width:280px;max-width:520px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
    .center-pop.ok .box{border-color:var(--accent)}
    .center-pop.err .box{border-color:var(--danger)}
  </style>
</head>
<body>
<div id="center-pop" class="center-pop"><div class="box" id="center-pop-text"></div></div>
<div class="wrap">
  <h2>NarCount Admin (Beta)</h2>

  <div class="card">
    <div class="row">
      <input id="u" placeholder="Admin username" />
      <input id="p" type="password" placeholder="Admin password" />
      <button class="primary" onclick="login()">Login</button>
      <button onclick="logout()">Logout</button>
      <button onclick="loadAll()">Refresh</button>
      <button id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
    </div>
    <div id="me" class="muted" style="margin-top:8px">Not logged in</div>
  </div>

  <div class="card">
    <h3>Create User</h3>
    <div class="row">
      <input id="newUser" placeholder="Username">
      <input id="newPass" type="password" placeholder="Password (min 8)">
      <select id="newAdmin"><option value="0">Standard user</option><option value="1">Admin user</option></select>
      <button class="primary" onclick="adminCreateUser()">Create</button>
    </div>
  </div>

  <div class="card">
    <h3>Users</h3>
    <table>
      <thead><tr><th>ID</th><th>Username</th><th>Admin</th><th>Active</th><th>Created</th><th>Actions</th></tr></thead>
      <tbody id="users"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>Backups</h3>
    <div class="row" style="margin-bottom:8px">
      <input id="filterUserId" placeholder="Filter user_id (optional)">
      <button onclick="loadBackups()">Load Backups</button>
    </div>
    <table>
      <thead><tr><th>ID</th><th>User</th><th>Label</th><th>Size</th><th>Created</th><th>Actions</th></tr></thead>
      <tbody id="backups"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>Audit Log</h3>
    <div class="row" style="margin-bottom:8px">
      <input id="auditLimit" placeholder="Limit (default 200)" value="200" style="max-width:180px">
      <button onclick="loadAudit()">Load Audit</button>
    </div>
    <table>
      <thead><tr><th>When</th><th>User</th><th>Action</th><th>Details</th><th>IP</th></tr></thead>
      <tbody id="auditRows"></tbody>
    </table>
  </div>
</div>
<script>
let ADMIN_CSRF='';
async function api(action,data={}){const payload={action,...data}; if(ADMIN_CSRF) payload.csrf=ADMIN_CSRF; const r=await fetch('/narcount_api.php',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});return r.json();}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}

function centerPop(msg, ok=true){const p=document.getElementById('center-pop');const t=document.getElementById('center-pop-text');if(!p||!t)return;p.className='center-pop '+(ok?'ok':'err');t.textContent=msg;p.style.display='flex';setTimeout(()=>p.style.display='none',1800);}
async function login(){const out=await api('login',{username:u.value.trim(),password:p.value});p.value='';if(out.ok) ADMIN_CSRF=out.csrf||ADMIN_CSRF; centerPop(out.ok?'Logged in':(out.error||'Login failed'),!!out.ok);await loadAll();}
async function logout(){await api('logout');await loadAll();}
async function meInfo(){const out=await api('me');if(out.ok&&out.authenticated){ADMIN_CSRF=out.csrf||ADMIN_CSRF; me.textContent=`Logged in as ${out.user.username}${out.user.isAdmin?' (admin)':''}`;} else {ADMIN_CSRF=''; me.textContent='Not logged in';}}

async function loadUsers(){
  const out=await api('admin_users');
  if(!out.ok){users.innerHTML=`<tr><td colspan='6'>${esc(out.error||'Not authorized')}</td></tr>`;return;}
  users.innerHTML=(out.items||[]).map(x=>`<tr>
    <td>${x.id}</td>
    <td><input id='un_${x.id}' value='${esc(x.username)}' style='width:170px'></td>
    <td><span class='pill ${x.is_admin==1?'ok':''}'>${x.is_admin==1?'yes':'no'}</span></td>
    <td><span class='pill ${x.is_active==1?'ok':''}'>${x.is_active==1?'yes':'no'}</span></td>
    <td>${esc(x.created_at)}</td>
    <td>
      <button onclick='saveUsername(${x.id})'>Save Name</button>
      <button onclick='toggleRole(${x.id},${x.is_admin==1?0:1})'>${x.is_admin==1?'Revoke Admin':'Make Admin'}</button>
      <button onclick='toggleActive(${x.id},${x.is_active==1?0:1})'>${x.is_active==1?'Disable':'Enable'}</button>
      <button onclick='resetPass(${x.id})'>Reset Pass</button>
      <button class='danger' onclick='deleteUser(${x.id})'>Delete User</button>
    </td>
  </tr>`).join('');
}

async function saveUsername(id){
  const username=document.getElementById('un_'+id).value.trim();
  const out=await api('admin_set_username',{user_id:id,username});
  if(!out.ok) alert(out.error||'Save failed');
  await loadUsers();
}
async function adminCreateUser(){
  const username=document.getElementById('newUser').value.trim();
  const password=document.getElementById('newPass').value;
  const isAdmin=Number(document.getElementById('newAdmin').value||0)===1;
  const reg=await api('register',{username,password});
  if(!reg.ok){alert(reg.error||'Create failed');return;}
  if(isAdmin){
    const usersOut=await api('admin_users');
    if(usersOut.ok){
      const u=(usersOut.items||[]).find(x=>x.username===username);
      if(u) await api('admin_set_role',{user_id:u.id,is_admin:1});
    }
  }
  alert('User created successfully');
  document.getElementById('newUser').value='';
  document.getElementById('newPass').value='';
  document.getElementById('newAdmin').value='0';
  await loadUsers();
}

async function toggleRole(id,is_admin){const out=await api('admin_set_role',{user_id:id,is_admin}); if(!out.ok) alert(out.error||'Role update failed'); await loadUsers();}
async function toggleActive(id,active){const out=await api('admin_set_active',{user_id:id,active}); if(!out.ok) alert(out.error||'Update failed'); await loadUsers();}
async function resetPass(id){const np=prompt('New password (min 8):',''); if(!np) return; const out=await api('admin_set_password',{user_id:id,new_password:np}); if(!out.ok) alert(out.error||'Reset failed'); else alert('Password reset');}
async function deleteUser(id){if(!confirm('Delete this user and all their backups?')) return; const out=await api('admin_delete_user',{user_id:id}); if(!out.ok) alert(out.error||'Delete failed'); await loadUsers(); await loadBackups();}

async function loadBackups(){
  const uid=(filterUserId.value||'').trim();
  const out=await api('admin_backups',uid?{user_id:Number(uid)}:{});
  if(!out.ok){backups.innerHTML=`<tr><td colspan='6'>${esc(out.error||'Not authorized')}</td></tr>`;return;}
  backups.innerHTML=(out.items||[]).map(b=>`<tr>
    <td>${b.id}</td>
    <td>${esc(b.username)} (#${b.user_id})</td>
    <td>${esc(b.label||'')}</td>
    <td>${Math.round((b.size_bytes||0)/1024)} KB</td>
    <td>${esc(b.created_at)}</td>
    <td>
      <button onclick='downloadBackup(${b.id})'>Download</button>
      <button class='danger' onclick='deleteBackup(${b.id})'>Delete</button>
    </td>
  </tr>`).join('');
}

async function downloadBackup(id){
  const out=await api('admin_backup_load',{id});
  if(!out.ok||!out.payload){alert(out.error||'Download failed');return;}
  const meta=out.meta||{};
  const blob=new Blob([JSON.stringify(out.payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`narcount_backup_user${meta.userId||'x'}_${meta.id||id}.json`;
  a.click();
}
async function deleteBackup(id){if(!confirm('Delete backup '+id+'?'))return; const out=await api('admin_backup_delete',{id}); if(!out.ok) alert(out.error||'Delete failed'); await loadBackups();}

async function loadAudit(){
  const limit=Number(document.getElementById('auditLimit').value||200);
  const out=await api('admin_audit_list',{limit});
  const el=document.getElementById('auditRows');
  if(!out.ok){el.innerHTML=`<tr><td colspan='5'>${esc(out.error||'Not authorized')}</td></tr>`;return;}
  const rows=out.items||[];
  if(!rows.length){el.innerHTML="<tr><td colspan='5'>No audit events</td></tr>";return;}
  el.innerHTML=rows.map(r=>`<tr><td>${esc(r.created_at)}</td><td>${esc(r.username||'system')}</td><td>${esc(r.action)}</td><td>${esc(r.details||'')}</td><td>${esc(r.ip||'')}</td></tr>`).join('');
}

async function loadAll(){await meInfo();await loadUsers();await loadBackups();await loadAudit();}
function applyTheme(){
  const t=localStorage.getItem('narcount_admin_theme')||'dark';
  document.body.classList.toggle('light', t==='light');
  const b=document.getElementById('themeBtn');
  if(b) b.textContent = t==='light' ? '☀️ Light' : '🌙 Dark';
}
function toggleTheme(){
  const now=document.body.classList.contains('light')?'light':'dark';
  localStorage.setItem('narcount_admin_theme', now==='light'?'dark':'light');
  applyTheme();
}

const u=document.getElementById('u'),p=document.getElementById('p'),me=document.getElementById('me'),users=document.getElementById('users'),backups=document.getElementById('backups'),filterUserId=document.getElementById('filterUserId'),auditRows=document.getElementById('auditRows'),auditLimit=document.getElementById('auditLimit');
[u,p].forEach(el=>el&&el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();login();}}));
applyTheme();
loadAll();
</script>
</body>
</html>
