<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<style>
	body
	{
		font-family:courier,sans-serif;
		font-size: 11px;
		position: absolute;
		top:  50%;
		left: 50%;
		transform: translate(-50%,-50%);
	}

	table{
		border: 1px solid black;
		table-layout: fixed;
	}
	td
	{
		border: 1px solid black;
		width: 70px;
		text-align:center;
	}
</style>
<meta http-equiv="content-type" content="text/html;charset=utf-8" />
<title>INR</title>
</head>
<body>

<script type="text/javascript">

  function setDate(){
    var today = new Date();
    var dd = today.getDate();
    var mm = today.getMonth()+1;
    var yyyy = today.getFullYear();
    yyyy = parseInt(yyyy) + 1;
    today = dd+'-'+mm+'-'+yyyy;
    document.getElementById("next_inr_date").value = today;
  }

  //function to restrict input to numbers and decimals
  function isNumberKey(evt)
  {
    var charCode = (evt.which) ? evt.which : evt.keyCode;
    if (charCode != 46 && charCode > 31
        && (charCode < 48 || charCode > 57))
      return false;

    return true;
  }

  //function to copy text
  function copyToClipboard(){
    document.getElementById('printout').focus();
    document.execCommand("Copy");
  }

  //function to compute the INR
  function calculate(){

    var targetrangeinr;
    var variationidentified;
    var currentweekly = document.getElementById("weekly_dose").value;
    var CurrentINR = document.getElementById("current_inr").value;
    var newweeklyupper;
    var newweeklylower;

    var n =  new Date();
    var yyyy = n.getFullYear();
    var mm = n.getMonth() + 1;
    var dd = n.getDate();

    var resultprint = dd + "/" + mm + "/" + yyyy + "<br>";

    if(document.getElementById("cible1").checked){
      targetrangeinr = true; //if target is 2 to 3
      resultprint += "Cible: 2 à 3<br>";
    } else {
      targetrangeinr = false; //if target is 2.5 to 3.5
      resultprint += "Cible: 2.5 à 3.5<br>";
    }

    resultprint += "INR: " + CurrentINR + "<br><br>";

    if(document.getElementById("variation1").checked){
      variationidentified = true; //if variation is temporary
      resultprint += "Facteur de variation: identifié - temporaire<br>";
    } else {
      variationidentified = false; //if variation is permanent
      resultprint += "Facteur de variation: non identifié<br>";
    }

    resultprint += "Dose hebdomadaire: " + document.getElementById("weekly_dose").value + "mg<br><br>";
    resultprint += "Nouvelle dose hebdomadaire: " + document.getElementById("new_dose").value + "mg (selon usager)<br>";
    resultprint += "Prochain INR: " + document.getElementById("next_inr_date").value +" (selon usager)<br><br>";

    if(variationidentified == true){
      if(targetrangeinr == true){ //if target is 2 to 3
        if(CurrentINR <= 1.5){
          resultprint += "Suggestion: Dose de charge x 3 jours puis refaire INR dans 1 semaine<br>Aviser MD<br>Considérer HFPM et refaire INR dans 3 jours";
        }
        if (CurrentINR >= 1.51 && CurrentINR <= 1.79){
          resultprint += "Suggestion: Dose de charge x 2 jours puis refaire INR dans 1 à 2 semaines<br>Aviser MD<br>Considérer HFPM et refaire INR dans 3 jours";
        }
        if (CurrentINR >= 1.8 && CurrentINR <= 1.99){
          resultprint += "Suggestion: Dose de charge x 1 jour puis refaire INR dans 4 semaines<br>";
        }
        if (CurrentINR >= 2 && CurrentINR <= 3.09){
          resultprint += "Suggestion: INR thérapeutique - continuer même dose et refaire INR dans 4 semaines<br>";
        }
        if (CurrentINR >= 3.1 && CurrentINR <= 3.39){
          resultprint += "Suggestion: INR supra-thérapeutique - continuer même dose et refaire INR dans 2 à 4 semaines<br>";
        }
        if (CurrentINR >= 3.4 && CurrentINR <= 3.79){
          resultprint += "Suggestion: Omettre une dose ou continuer à monitorer. INR dans 1 à 2 semaines<br>";
        }
        if (CurrentINR >= 3.8 && CurrentINR <= 4.59){
          resultprint += "Suggestion: Omettre une dose et refaire INR dans 1 semaine<br>";
        }
        if (CurrentINR >= 4.6 && CurrentINR <= 5.0){
          resultprint += "Suggestion: Omettre 2 doses et refaire INR dans 1 semaine<br>";
        }
        if (CurrentINR >= 5.1){
            resultprint += "Suggestion: Cesser le warfarin/Coumadin et diriger à l'urgence<br>";
        }
      }
      if(targetrangeinr == false){ //if target is 2.5 to 3.5
        if(CurrentINR <= 1.5){
          resultprint += "Suggestion: Dose de charge x 3 jours puis refaire INR dans 1 semaine<br>Aviser MD<br>Considérer HFPM et refaire INR dans 3 jours<br>";
        }
        if (CurrentINR >= 1.51 && CurrentINR <= 1.99){
          resultprint += "Suggestion: Dose de charge x 2 jours puis refaire INR dans 1 semaine<br>Aviser MD<br>Considérer HFPM et refaire INR dans 3 jours<br>";
        }
        if (CurrentINR >= 2 && CurrentINR <= 2.29){
          resultprint += "Suggestion: Dose de charge x 1 jour puis refaire INR dans 1 à 2 semaines<br>";
        }
        if (CurrentINR >= 2.3 && CurrentINR <= 2.49){
          resultprint += "Suggestion: Dose de charge x 1 jour puis refaire INR dans 2 à 4 semaines<br>";
        }
        if (CurrentINR >= 2.5 && CurrentINR <= 3.59){
          resultprint += "Suggestion: INR thérapeutique - continuer même dose et refaire INR dans 4 semaines<br>";
        }
        if (CurrentINR >= 3.6 && CurrentINR <= 3.99){
          resultprint += "Suggestion: INR supra-thérapeutique - continuer même dose et refaire INR dans 2 à 4 semaines<br>";
        }
        if (CurrentINR >= 4.0 && CurrentINR <= 4.49){
          resultprint += "Suggestion: Omettre une dose ou continuer à monitorer. INR dans 1 semaine<br>";
        }
        if (CurrentINR >= 4.5 && CurrentINR <= 5.39){
          resultprint += "Suggestion: Omettre une dose et refaire INR dans 1 semaine. Aviser le MD<br>";
        }
        if (CurrentINR >= 5.4 && CurrentINR <= 5.99){
          resultprint += "Suggestion: Omettre 2 doses et diriger vers MD. Refaire INR dans 2 jours<br>";
        }
        if (CurrentINR >= 6){
          resultprint += "Suggestion: Cesser le warfarin/Coumadin et diriger en urgence<br>";
        }
      }
    }

    if(variationidentified == false){
      if(targetrangeinr == true){ //if target is 2 to 3
        if(CurrentINR <= 1.5){
          newweeklylower = Math.round(currentweekly * 10 * 1.15) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * 1.2) / 10;
          resultprint += "Suggestion: Dose de charge x 2-3 jours puis refaire INR dans 1 semaine<br>Aviser MD<br>Considérer HFPM et refaire INR dans 3-4 jours<br>Augmenter dose par 15-20%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 1.51 && CurrentINR <= 1.79){
          newweeklylower = Math.round(currentweekly * 10 * 1.10) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * 1.125) / 10;
          resultprint += "Suggestion: Dose de charge x 2 jours puis refaire INR dans 1 à 2 semaines<br>Aviser MD<br>Considérer HFPM et refaire INR dans 3-4 jours<br>Augmenter dose par 10-12.5%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 1.8 && CurrentINR <= 1.99){
          newweeklylower = Math.round(currentweekly * 10 * 1.05) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * 1.075) / 10;
          resultprint += "Suggestion: Dose de charge x 1 jours puis refaire INR dans 2 à 4 semaines<br>Augmenter dose par 5-7.5%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 2 && CurrentINR <= 3.09){
          resultprint += "Suggestion: INR thérapeutique - continuer même dose et refaire INR dans 4 semaines<br>";
        }
        if (CurrentINR >= 3.1 && CurrentINR <= 3.39){
          resultprint += "Suggestion: INR supra-thérapeutique - continuer même dose et refaire INR dans 2 à 4 semaines<br>";
        }
        if (CurrentINR >= 3.4 && CurrentINR <= 3.79){
          newweeklylower = Math.round(currentweekly * 10 * 0.95) / 10;
          resultprint += "Suggestion: INR supgra-thérapeutique<br>Diminuer dose par 5%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + "mg<br>";
        }
        if (CurrentINR >= 3.8 && CurrentINR <= 4.59){
          newweeklylower = Math.round(currentweekly * 10 * .925) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * .95) / 10;
          resultprint += "Suggestion: Omettre 1 dose et refaire INR dans 1 semaine<br>Diminuer dose par 5-7.5%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 4.6 && CurrentINR <= 5.0){
          newweeklylower = Math.round(currentweekly * 10 * 0.85) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * 0.9) / 10;
          resultprint += "Suggestion: Omettre 2 doses et refaire INR dans 2 jours<br>Diminuer dose par 10-15%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 5.1){
            resultprint += "Suggestion: Cesser le warfarin/Coumadin et diriger à l'urgence<br>";
        }
      }
      if(targetrangeinr == false){ //if target is 2.5 to 3.5
        if(CurrentINR <= 1.5){
          newweeklylower = Math.round(currentweekly * 10 * 1.15) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * 1.2) / 10;
          resultprint += "Suggestion: Dose de charge x 3 jours puis refaire INR dans 1 semaine<br>Aviser MD<br>Considérer HFPM et refaire INR dans 3-4 jours<br>Augmenter dose par 15-20%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 1.51 && CurrentINR <= 1.89){
          newweeklylower = Math.round(currentweekly * 10 * 1.10) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * 1.125) / 10;
          resultprint += "Suggestion: Dose de charge x 2 jours puis refaire INR dans 1 semaine<br>Aviser MD<br>Considérer HFPM et refaire INR dans 3-4 jours<br>Augmenter dose par 10-12.5%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 1.9 && CurrentINR <= 2.29){
          newweeklylower = Math.round(currentweekly * 10 * 1.075) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * 1.1) / 10;
          resultprint += "Suggestion: Dose de charge x 1 jour puis refaire INR dans 2 semaines<br>Augmenter dose par 7.5-10%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 2.3 && CurrentINR <= 2.49){
          newweeklylower = Math.round(currentweekly * 10 * 1.03) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * 1.05) / 10;
          resultprint += "Suggestion: INR sub-thérapeutique. Refaire INR dans 2 à 4 semaines<br>Augmenter dose par 3-5%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 2.5 && CurrentINR <= 3.59){
          resultprint += "Suggestion: INR thérapeutique - continuer même dose et refaire INR dans 4 semaines<br>";
        }
        if (CurrentINR >= 3.6 && CurrentINR <= 3.99){
          resultprint += "Suggestion: INR supra-thérapeutique - continuer même dose et refaire INR dans 2 à 4 semaines<br>";
        }
        if (CurrentINR >= 4.0 && CurrentINR <= 4.49){
          newweeklylower = Math.round(currentweekly * 10 * .95) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * .975) / 10;
          resultprint += "Suggestion: Omettre 1 dose et refaire INR dans 1 semaine<br>Diminuer dose par 2.5-5%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 4.5 && CurrentINR <= 5.39){
          newweeklylower = Math.round(currentweekly * 10 * .925) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * .95) / 10;
          resultprint += "Suggestion: Omettre 1 dose et refaire INR dans 1 semaine<br>Aviser MD<br>Diminuer dose par 5-7.5%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 5.4 && CurrentINR <= 5.99){
          newweeklylower = Math.round(currentweekly * 10 * .85) / 10;
          newweeklyupper = Math.round(currentweekly * 10 * .90) / 10;
          resultprint += "Suggestion: Omettre 2 dose et refaire INR dans 2 jours<br>Diriger vers MD<br>Diminuer dose par 10-15%<br>";
          resultprint += "Nouvelle dose hebdomadaire suggérée: " + newweeklylower + " à " + newweeklyupper +"mg<br>";
        }
        if (CurrentINR >= 6){
          resultprint += "Suggestion: Cesser le warfarin/Coumadin et diriger en urgence<br>";
        }
      }

      //The following divides the weekly dose by 7, floors the number and grabs the reminder and then calculates the daily doses to give.
    var unroundeddailylower = Math.round(newweeklylower) / 7;
    var unroundeddailyupper = Math.round(newweeklyupper) / 7;
    var fulldoselower = Math.floor(unroundeddailylower);
    var fulldoseupper = Math.floor(unroundeddailyupper);
    var decimaldoselower = (unroundeddailylower) - fulldoselower;
    var decimaldoseupper = (unroundeddailyupper) - fulldoseupper;
    var dailyadddoselower = fulldoselower + 1;
    var dailyadddoseupper = fulldoseupper + 1;

      if(0 == Math.round(decimaldoselower * 7)){
        resultprint += "Dose suggérée: " + fulldoselower + "mg x 7/7<br>ou<br>";
      }
      if(0 == Math.round(decimaldoseupper * 7)){
        resultprint += fulldoseupper + "mg x 7/7<br>";
      }
      if(1 == Math.round(decimaldoselower * 7)){
        resultprint += "Dose suggérée: " + fulldoselower + "mg x 6/7 et " + dailyadddoselower + "mg x 1/7<br>ou<br>";
      }
      if(1 == Math.round(decimaldoseupper * 7)){
        resultprint += fulldoseupper + "mg x 6/7 et " + dailyadddoseupper + "mg x 1/7<br>";
      }
      if(2 == Math.round(decimaldoselower * 7)){
        resultprint += "Dose suggérée: " + fulldoselower + "mg x 5/7 et " + dailyadddoselower + "mg x 2/7<br>ou<br>";
      }
      if(2 == Math.round(decimaldoseupper * 7)){
        resultprint += fulldoseupper + "mg x 5/7 et " + dailyadddoseupper + "mg x 2/7<br>";
      }
      if(3 == Math.round(decimaldoselower * 7)){
        resultprint += "Dose suggérée: " + fulldoselower + "mg x 4/7 et " + dailyadddoselower + "mg x 3/7<br>ou<br>";
      }
      if(3 == Math.round(decimaldoseupper * 7)){
        resultprint += fulldoseupper + "mg x 4/7 et " + dailyadddoseupper + "mg x 3/7<br>";
      }
      if(4 == Math.round(decimaldoselower * 7)){
        resultprint += "Dose suggérée: " + fulldoselower + "mg x 3/7 et " + dailyadddoselower + "mg x 4/7<br>ou<br>";
      }
      if(4 == Math.round(decimaldoseupper * 7)){
        resultprint += fulldoseupper + "mg x 3/7 et " + dailyadddoseupper + "mg x 4/7<br>";
      }
      if(5 == Math.round(decimaldoselower * 7)){
        resultprint += "Dose suggérée: " + fulldoselower + "mg x 2/7 et " + dailyadddoselower + "mg x 5/7<br>ou<br>";
      }
      if(5 == Math.round(decimaldoseupper * 7)){
        resultprint += fulldoseupper + "mg x 2/7 et " + dailyadddoseupper + "mg x 5/7<br>";
      }
      if(6 == Math.round(decimaldoselower * 7)){
        resultprint += "Dose suggérée: " + fulldoselower + "mg x 1/7 et " + dailyadddoselower + "mg x 6/7<br>ou<br>";
      }
      if(6 == Math.round(decimaldoseupper * 7)){
        resultprint += fulldoseupper + "mg x 1/7 et " + dailyadddoseupper + "mg x 6/7<br>";
      }
    }


    // console.log(newweeklylower);
    // console.log(fulldoselower);
    // console.log(decimaldoselower);
    // console.log(decimaldoselower * 7);
    // console.log(decimaldoseupper * 7);

    document.getElementById("printout").innerHTML = resultprint;
}
</script>
  <p style="font-size:17px" contenteditable="true" id="printout" onfocus="document.execCommand('selectAll',false,null);"></p>
<table style="width: auto;">
  <form>
	  <tr>
			<td>Cible:</td>
			<td><input checked="checked" name="radio_cible" type="radio" id="cible1"> 2 &agrave; 3<br>
			<input name="radio_cible" type="radio" id="cible2"> 2.5 &agrave; 3.5</td>
		</tr>
		<tr>
			<td>INR:</td>
			<td><input maxlength="4" id="current_inr" size="4" type="text" onkeypress="return isNumberKey(event)"></td>
		</tr>
		<tr>
			<td>Facteur de variation:</td>
			<td><input name="variation" type="radio" id="variation1">Oui<br>
			<input checked="checked" name="variation" type="radio" id="variation2">Non</td>
		</tr>
		<tr>
			<td>Dose hebdomadaire:</td>
			<td><input id="weekly_dose" size="2" type="text" onkeypress="return isNumberKey(event)">mg</td>
		</tr>
		<tr>
			<td>Nouvelle dose:</td>
			<td><input onload="setDate()" id="new_dose" size="2" type="text" onkeypress="return isNumberKey(event)">mg</td>
		</tr>
		<tr>
			<td>Prochain INR:</td>
			<td><input onload="setDate()" type="date" id="next_inr_date"></td>
		</tr>
  </form>
</table>
<button onClick="copyToClipboard()">Copier</button>----------------
<input onClick="calculate()" type="button" value="Soumettre">

</body>
</html>
