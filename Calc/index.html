<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PharmD - Appuyez sur W</title>
  <style>
    body {
      font-family: Courier, sans-serif;
      font-size: 20px;
      text-align: center;
      overflow-x: hidden;
      margin: 0;
      padding: 20px;
      position: relative;
    }

    h1 {
      color: #0000CD;
      font-size: 48px;
      margin-bottom: 10px;
    }

    #easterInput {
      font-family: inherit;
      font-size: 20px;
      padding: 5px 10px;
      margin-bottom: 10px;
      border: 2px solid #0000CD;
      border-radius: 8px;
      width: 300px;
      max-width: 90%;
    }

    #loopCheckboxLabel {
      display: block;
      margin-bottom: 30px;
      font-size: 16px;
    }

    a {
      text-decoration: none;
      display: block;
      margin: 10px 0;
    }

    .emoji {
      position: absolute;
      font-size: 24px;
      animation: floatUp 4s linear forwards;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translateY(-100vh) scale(1.5) rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <h1>PharmD.ca</h1>

  <input id="easterInput" type="text" placeholder="Mon nom est Wilson" />
  <label id="loopCheckboxLabel">
    <input type="checkbox" id="loopCheckbox" />
    :)
  </label>

  <a href="https://friday.mxlogin.com:2096/">EMAIL</a>
  <a href="fuel.html" style="color: transparent;">FUEL</a>

  <script>
const emojiPresets = {
  love: ['❤️', '💖', '💘', '💕', '💓'],
  wilson: ['❤️', '💖', '💘', '💕', '💓'],
  victor: ['💪', '🍖', '🥩', '🍗'],
  marie: ['🐱', '🐾', '🪶', '🐰'],
  devonteh: ['🏀', '🥡', '🍚'],
  elijah: ['🍆', '🍑', '🍉', '🧃'],
  vanessa: ['🧸', '👜', '👛', '🎀'],
  michael: ['🌮', '🍗', '🍔', '🍕', '🍟'],
  eric: ['🧔🏿', '👨🏿', '👱🏿‍♂️', '🙎🏿‍♂️', '🕵🏿‍♂️'],
  lucia: ['🍫', '🍩', '🍬', '🍭', '🍰', '☕', '🧁'],
  'shi hao': ['🃏', '🎴', '💠', '✨', '🧠', '🧩', '🔷', '👁️', '🌀'],
  aida: ['🧴', '💅', '🧖‍♀️', '💄', '🛁', '🧼', '🪮', '🪞'],
  oanh: ['🍜', '🥢', '🥖', '☀️', '🏮', '👧', '📏', '🐥']
};

    const loopCheckbox = document.getElementById('loopCheckbox');
    let loopInterval = null;

    function launchEmojis(emojiList, count = 30) {
      for (let i = 0; i < count; i++) {
        const emoji = document.createElement('span');
        emoji.className = 'emoji';
        emoji.style.left = Math.random() * window.innerWidth + 'px';
        emoji.style.top = window.innerHeight + 'px';
        emoji.style.fontSize = 20 + Math.random() * 20 + 'px';
        emoji.style.animationDuration = (3 + Math.random() * 2) + 's';
        emoji.textContent = emojiList[Math.floor(Math.random() * emojiList.length)];
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 5000);
      }
    }

    const easterInput = document.getElementById('easterInput');
    easterInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const value = easterInput.value.trim().toLowerCase();
        const emojis = emojiPresets[value];

        if (emojis) {
          // Clear any existing loop
          if (loopInterval) {
            clearInterval(loopInterval);
            loopInterval = null;
          }

          launchEmojis(emojis, 30);

          // Loop emojis if checkbox is checked
          if (loopCheckbox.checked) {
            loopInterval = setInterval(() => {
              launchEmojis(emojis, 20);
            }, 2000);
          }
        }

        easterInput.value = '';
      }
    });

    // Stop looping when checkbox is unchecked
    loopCheckbox.addEventListener('change', () => {
      if (!loopCheckbox.checked && loopInterval) {
        clearInterval(loopInterval);
        loopInterval = null;
      }
    });

    // Keyboard shortcut (W)
    document.addEventListener('keydown', function(e) {
      if (e.key.toLowerCase() === 'w' && document.activeElement !== easterInput) {
        launchEmojis(['❤️'], 20);
      }
    });
  </script>

</body>
</html>
