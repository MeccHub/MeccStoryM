<html xmlns="http://www.w3.org/1999/xhtml">
<head>

<style>
  body
  {
    font-family:courier,sans-serif;
    font-size: 11px;
    position: absolute;
    top:  50%;
    left: 50%;
    transform: translate(-50%,-50%);
  }

	table{
		border: 1px solid black;
		table-layout: fixed;
	}
	td
	{
		border: 1px solid black;
		width: auto;
    text-align: center;
	}
</style>
<meta http-equiv="content-type" content="text/html;charset=utf-8">
<title>ABX</title>
</head>

<body onLoad="disableUnused();" onkeypress="isEnter(event)">

  <script type="text/javascript">

  //function to erase all fields
    function eraseAll(){
      document.getElementById("med_name").value = "";
      document.getElementById("format_mg").value = "";
      document.getElementById("format_ml").value = "";
      document.getElementById("indication_reason").value = "";
      document.getElementById("poids_kg").value = "";
      document.getElementById("poids_lbs").value = "";
      document.getElementById("dose_value1").value = "";
      document.getElementById("dose_value2").value = "";
      document.getElementById("dose_value3").value = "";
      document.getElementById("duration").value = "";
      document.getElementById("med_name").focus;
    }

  //function to check if enter key is pressed
  function isEnter(event){
    var x = event.which || event.keyCode;
    if (x == 13){
      var medname = document.getElementById("med_name").value
      if (medname == "771313000628" || medname == "771313078160" || medname == "771313000604" || medname == "771313078146" || medname == "628003003080"){
        document.getElementById("med_name").value = "Amoxicilline";
        document.getElementById("format_mg").value = 250;
        document.getElementById("format_ml").value = 5;
      }
      if (medname == "771313000598" || medname == "771313000567"){
        document.getElementById("med_name").value = "Amoxicilline";
        document.getElementById("format_mg").value = 125;
        document.getElementById("format_ml").value = 5;
      } else {
      abxify();
      }
    }
  }

  //function to restrict input to numbers and decimals
  function isNumberKey(evt)
  {
    var charCode = (evt.which) ? evt.which : evt.keyCode;
    if (charCode != 46 && charCode > 31
        && (charCode < 48 || charCode > 57))
      return false;

    return true;
  }

  //function to copy text
  function copyToClipboard(){
    document.getElementById('printout').focus();
    document.execCommand("Copy");
  }

  //function to disable text fields
    function disableUnused(){
      if(document.getElementById("type_mg").checked){
        document.getElementById("dose_value1").disabled = false;
        document.getElementById("dose_value2").disabled = true;
        document.getElementById("dose_value3").disabled = true;
        document.getElementById("dose_value2").value = "";
        document.getElementById("dose_value3").value = "";
        }
      if(document.getElementById("type_mgkgjr").checked){
        document.getElementById("dose_value1").disabled = true;
        document.getElementById("dose_value2").disabled = false;
        document.getElementById("dose_value3").disabled = true;
        document.getElementById("dose_value1").value = "";
        document.getElementById("dose_value3").value = "";
        }
      if(document.getElementById("type_mgkgdose").checked){
        document.getElementById("dose_value1").disabled = true;
        document.getElementById("dose_value2").disabled = true;
        document.getElementById("dose_value3").disabled = false;
        document.getElementById("dose_value1").value = "";
        document.getElementById("dose_value2").value = "";
        }
    }
  //function to calculate abx
    function abxify(){

      //start by printing out the date
      var n =  new Date();
      var yyyy = n.getFullYear();
      var mm = n.getMonth() + 1;
      var dd = n.getDate();

      var resultprint = dd + "/" + mm + "/" + yyyy + "<br>";

      //assign stuff to be printed
      var abxduration = document.getElementById("duration").value;
      var abxname = document.getElementById("med_name").value;
      var abxindication = document.getElementById("indication_reason").value;
      var conc_mg = document.getElementById("format_mg").value;
      var conc_ml = document.getElementById("format_ml").value;

      resultprint += "Abx: " + abxname + "<br>";


      //determine weight in kg and check if two weight values
      if (document.getElementById("poids_lbs").value <= 0 && document.getElementById("poids_kg").value > 0){
        var weight = document.getElementById("poids_kg").value;
        //console.log(weight);
      }
      if (document.getElementById("poids_kg").value <= 0 && document.getElementById("poids_lbs").value > 0){
        var weight = Math.round(document.getElementById("poids_lbs").value / 2.20462 * 10) / 10;
        //console.log(weight);
      }
      if (document.getElementById("poids_lbs").value == 0 && document.getElementById("poids_kg").value == 0){
        var weight = "**ERREUR** POIDS À 0";
      }
      if (document.getElementById("poids_kg").value > 0 && document.getElementById("poids_lbs").value > 0){
        var weight = "**ERREUR** DEUX POIDS";
      }

      resultprint += "Poids : " + weight + "kg<br>";
      resultprint += "Indication: " + abxindication + "<br>";

      //determine frequency of dosing
      if(document.getElementById("DIE_selected").checked){
        var dosingfreq = 1;
        var dosingcode = "DIE";
      }
      if(document.getElementById("BID_selected").checked){
        var dosingfreq = 2;
        var dosingcode = "BID";
      }
      if(document.getElementById("TID_selected").checked){
        var dosingfreq = 3;
        var dosingcode = "TID";
      }
      if(document.getElementById("QID_selected").checked){
        var dosingfreq = 4;
        var dosingcode = "QID";
      }

      //calculate the daily dose and total dose given
      if(document.getElementById("type_mg").checked){
        var singledose = Math.round(document.getElementById("dose_value1").value);
        var dailydose = singledose * dosingfreq;
        var dosekgjr = Math.round(dailydose / weight);
      }
      if(document.getElementById("type_mgkgjr").checked){
        if (!isNaN(weight)){
          var singledose = Math.round(document.getElementById("dose_value2").value * weight / dosingfreq);
          var dailydose = singledose * dosingfreq;
          var dosekgjr = Math.round(dailydose / weight);
        } else {
          resultprint = weight;
        }
      }
      if(document.getElementById("type_mgkgdose").checked){
        if (!isNaN(weight)){
          var singledose =Math.round(document.getElementById("dose_value3").value * weight);
          var dailydose = singledose * dosingfreq;
          var dosekgjr = Math.round(dailydose / weight);
        } else {
          resultprint = weight;
        }
      }

      //determine the total duration of the doses to give
      if (document.getElementById("duration").value <= 0){
        var courseduration = "**ERREUR** DURÉE À 0";
      }
      else {
        var courseduration = document.getElementById("duration").value;
      }

      //calculate total dose given throughout the course
      if(!isNaN(courseduration)){
        var totaldose = dailydose * courseduration;
      } else {
        resultprint = courseduration;
      }

      //determine the concentration and dose in ML
      if (conc_mg == 0 || conc_ml == 0){
        conc_mg = "**ERREUR** Manque concentration";
        conc_ml = "**ERREUR** Manque concentration";
      } else {
        var mgperoneml = conc_mg / conc_ml;
        var totalmlgiven = totaldose / mgperoneml;
        var mlperdose = singledose / mgperoneml;
      }

      resultprint += "Posologie: " + singledose + "mg (" + mlperdose + "ml) " + dosingcode + " x " + courseduration + " jour(s)<br>";
      resultprint += "<br> Dose quotidien: " + dailydose + "mg<br>Dose/kg: " + dosekgjr +  "mg/kg/jr<br>";
      resultprint += "Quantité totale en ml: " + Math.ceil(totalmlgiven) +"ml<br>";

      if(isNaN(courseduration) || isNaN(weight) || isNaN(conc_mg) || isNaN(conc_ml)){
        resultprint = courseduration + "<br>";
        resultprint += weight + "<br>";
        resultprint += conc_mg + "<br>";
        resultprint += conc_ml;
      }

      document.getElementById("printout").innerHTML = resultprint;
    }
  </script>
  <p style="font-size:15px" contenteditable="true" id="printout" onfocus="document.execCommand('selectAll',false,null);"></p>
  <table>
    <tbody>
      <tr>
        <td>M&eacute;dicament:</td>
        <td>
          <input id="med_name" size="auto" type="text" list="meds" autofocus>
          <datalist id="meds">
            <option>Amoxicilline</option>
            <option>Amoxicilline-Clavulanate</option>
            <option>Zithromycine</option>
            <option>Clarithromycine</option>
            <option>Clindamycine</option>
            <option>Cefprozil</option>
          </datalist>
        </td>
      </tr>
      <tr>
        <td>Concentration:</td>
        <td><input id="format_mg" type="text" size="3" value="250" onkeypress="return isNumberKey(event)">mg/<input id="format_ml" type="text" size="1" value="5" onkeypress="return isNumberKey(event)">ml</td>
      </tr>
      <tr>
        <td>Indication:</td>
        <td><input id="indication_reason" size="auto" type="text" list="inds">
          <datalist id="inds">
            <option>Otite</option>
            <option>Pharyngite</option>
            <option>Abcès</option>
            <option>Abcès dentaire</option>
            <option>Bronchite</option>
            <option>Cellulite</option>
            <option>Infection urinaire</option>
            <option>Pneumonie</option>
            <option>Sinusite</option>
          </datalist>
        </td>
      </tr>
      <tr>
        <td>Poids:</td>
        <td><input id="poids_kg" size="3" type="text" onkeypress="return isNumberKey(event)">kg/<input id="poids_lbs" size="3" type="text"onkeypress="return isNumberKey(event)">lbs</td>
      </tr>
      <tr>
        <td>Dose:</td>
        <td style="text-align: left;">
          <input name="dosing_type" type="radio"checked="checked" id="type_mg" onchange="disableUnused();"><input id="dose_value1" size="3" type="text" onkeypress="return isNumberKey(event)">mg<br>
          <input name="dosing_type" type="radio" id="type_mgkgjr" onchange="disableUnused();"><input id="dose_value2" size="3" type="text" onkeypress="return isNumberKey(event)">mg/kg/jr<br>
          <input name="dosing_type" type="radio" id="type_mgkgdose" onchange="disableUnused();"><input id="dose_value3" size="3" type="text" onkeypress="return isNumberKey(event)">mg/kg/dose</td>
      </tr>
      <tr>
        <td>Durée</td>
        <td><input value="10" id="duration" type="text" size="3" onkeypress="return isNumberKey(event)">jours</td>
      </tr>
      <tr>
        <td>Fr&eacute;quence:</td>
        <td>
          <input name="dose_freq" type="radio" id="DIE_selected">DIE<br>
          <input name="dose_freq" type="radio" id="BID_selected" checked="checked">BID<br>
          <input name="dose_freq" type="radio" id="TID_selected">TID<br>
          <input name="dose_freq" type="radio" id="QID_selected">QID</td>
      </tr>
    </tbody>
  </table>
  <input onClick="abxify()" type="button" value="Soumettre">-------
  <button onClick="eraseAll()">Effacer</button>-------
  <button onClick="copyToClipboard()">Copier</button>
</body>

</html>
